# .pre-commit-config.yaml
default_stages: [pre-commit]

repos:
  - repo: local
    hooks:
      - id: svelte-check
        name: Svelte Check
        # Assuming you use npm. Change to 'pnpm', 'yarn', or 'bun' if needed.
        entry: pnpm run check
        language: system
        # We set this to false because svelte-check needs to check the whole project context
        pass_filenames: false
        types_or: [svelte, ts, javascript]

      - id: eslint
        name: ESLint
        entry: pnpm run lint
        language: system
        # Since your script is "eslint .", it lints everything.
        # We disable passing individual filenames to prevent appending them to "eslint ."
        pass_filenames: false
        types_or: [javascript, ts, svelte]
